# Copy this file to application.properties before running the backend.
# Example:
# cp src/main/resources/application.example.properties src/main/resources/application.properties

server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/study_room_booking?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=your_password_here
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Notification settings
app.notification.frontend-base-url=http://localhost:5173
app.notification.resend.enabled=false
app.notification.resend.api-key=your_resend_api_key_here
app.notification.resend.from-email=no-reply@example.com
app.notification.resend.from-name=Study Room
app.notification.resend.reply-to=support@example.com
app.notification.resend.swap-request-path=/swap-requests
app.notification.resend.api-base-url=https://api.resend.com
